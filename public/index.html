<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone - Fast Local File Share</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Drop<span>Zone</span></h1>
            <p>Share large files instantly across your local network.</p>
        </header>

        <div class="card">
            <div id="drop-zone" class="drop-zone">
                <div class="icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </div>
                <p>Drag and drop your file here</p>
                <span class="or">or</span>
                <input type="file" id="file-input" style="display: none;">
                <button id="browse-btn" class="btn">Browse Files</button>
            </div>

            <div id="progress-container" class="progress-container" style="display: none;">
                <div class="file-info">
                    <span id="file-name" class="file-name">filename.zip</span>
                    <span id="file-size" class="file-size">0 MB</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="progress-text" class="progress-text">0%</div>
            </div>

            <div id="result-container" class="result-container" style="display: none;">
                <div class="success-icon">✓</div>
                <h3>Upload Complete!</h3>
                <p>Share this link to download the file on another machine:</p>
                <div class="link-box">
                    <input type="text" id="share-link" readonly>
                    <button id="copy-btn" class="btn secondary">Copy</button>
                </div>
                <button id="upload-another-btn" class="btn text-btn" style="margin-top: 1rem; background: none; color: var(--text-muted);">Upload Another File</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
